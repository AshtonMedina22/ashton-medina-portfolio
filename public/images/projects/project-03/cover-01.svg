  <rect x="24" y="285" width="540" height="80" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <rect x="40" y="305" width="500" height="2" fill="#a78bfa" opacity="0.3"/>
  <text x="40" y="330" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">System Implementation</text>
  <text x="40" y="348" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Est: $12,000 • Actual: $11,800 • Variance: -$200 (Favorable)</text>
