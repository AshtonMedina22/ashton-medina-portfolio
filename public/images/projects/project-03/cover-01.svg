  <!-- Service 2 -->
  <rect x="608" y="285" width="540" height="80" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <rect x="624" y="305" width="500" height="2" fill="#22d3ee" opacity="0.3"/>
  <text x="624" y="330" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">Training & Documentation</text>
  <text x="624" y="348" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Est: $8,500 • Actual: $9,200 • Variance: +$700 (Monitor)</text>
  <text x="1064" y="330" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#fbbf24" text-anchor="end">⚠ Overrun</text>
  
  <!-- Cost breakdown chart -->
  <text x="24" y="415" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">Vendor Cost Breakdown</text>
  
  <rect x="24" y="430" width="1152" height="140" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  
  <!-- Bar 1 -->
  <rect x="40" y="450" width="400" height="25" rx="6" fill="#a78bfa"/>
  <text x="56" y="467" font-family="Open Sans, sans-serif" font-size="11" fill="#09090b" font-weight="600">Development Services (45%)</text>
  <text x="448" y="467" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">$9,945</text>
  
  <!-- Bar 2 -->
