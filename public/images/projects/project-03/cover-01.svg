  <text x="648" y="185" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Protected & locked</text>
  
  <rect x="936" y="110" width="240" height="120" rx="10" fill="#1a1625" stroke="#a78bfa" stroke-width="2"/>
  <text x="952" y="135" font-family="Open Sans, sans-serif" font-size="10" fill="#a78bfa">MARGIN %</text>
  <text x="952" y="165" font-family="Open Sans, sans-serif" font-size="32" font-weight="700" fill="#a78bfa">53.5%</text>
  <text x="952" y="185" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Well above target</text>
  
  <!-- Variance breakdown -->
  <text x="24" y="270" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">Cost Variance Tracking</text>
  
