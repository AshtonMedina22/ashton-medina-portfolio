  <text x="56" y="502" font-family="Open Sans, sans-serif" font-size="11" fill="#09090b" font-weight="600">Infrastructure (28%)</text>
  <text x="298" y="502" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">$6,188</text>
  
  <!-- Bar 3 -->
  <rect x="40" y="520" width="180" height="25" rx="6" fill="#10b981"/>
  <text x="56" y="537" font-family="Open Sans, sans-serif" font-size="11" fill="#09090b" font-weight="600">Staffing (20%)</text>
  <text x="228" y="537" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">$4,420</text>
