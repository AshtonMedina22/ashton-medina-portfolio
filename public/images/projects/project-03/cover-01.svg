  <text x="40" y="185" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">TechCorp Platform Impl.</text>
  
  <rect x="328" y="110" width="280" height="120" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="344" y="135" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">ESTIMATED COST</text>
  <text x="344" y="165" font-family="Open Sans, sans-serif" font-size="32" font-weight="700" fill="#a78bfa">$22,100</text>
