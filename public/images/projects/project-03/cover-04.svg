<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="darkBg12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#darkBg12)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#09090b" opacity="0.8"/>
  <text x="24" y="38" font-family="Open Sans, sans-serif" font-size="16" font-weight="600" fill="#f5f3ff">Budget-to-Actual Analysis</text>
  
  <!-- Title -->
  <text x="24" y="95" font-family="Open Sans, sans-serif" font-size="14" font-weight="600" fill="#f5f3ff">Unified View: Pipeline → Quote → Delivery</text>
  
  <!-- Project header -->
  <rect x="24" y="120" width="1152" height="60" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="40" y="145" font-family="Open Sans, sans-serif" font-size="13" font-weight="600" fill="#f5f3ff">TechCorp Annual Implementation • ENG-2024-0842</text>
  <text x="40" y="165" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">Client: TechCorp • Service: Platform Implementation • Timeline: 12 weeks</text>
  
  <!-- Chain visualization -->
  <text x="24" y="220" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Financial Chain</text>
  
  <!-- Step boxes -->
  <!-- 1. Pipeline -->
  <rect x="40" y="240" width="240" height="100" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="80" cy="265" r="6" fill="#22d3ee"/>
  <text x="160" y="270" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff" text-anchor="middle">Pipeline Budget</text>
  <text x="160" y="300" font-family="Open Sans, sans-serif" font-size="20" font-weight="700" fill="#22d3ee" text-anchor="middle">$50,000</text>
  <text x="160" y="320" font-family="Open Sans, sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle">What client said</text>
  
  <!-- Arrow -->
  <line x1="280" y1="290" x2="310" y2="290" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  
  <!-- 2. Quote -->
  <rect x="310" y="240" width="240" height="100" rx="8" fill="#27272a" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="350" cy="265" r="6" fill="#a78bfa"/>
  <text x="430" y="270" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff" text-anchor="middle">Sales Quote</text>
  <text x="430" y="300" font-family="Open Sans, sans-serif" font-size="20" font-weight="700" fill="#a78bfa" text-anchor="middle">$47,500</text>
  <text x="430" y="320" font-family="Open Sans, sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle">What we quoted</text>
  
  <!-- Arrow -->
  <line x1="550" y1="290" x2="580" y2="290" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  
  <!-- 3. Estimated Cost -->
  <rect x="580" y="240" width="240" height="100" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="620" cy="265" r="6" fill="#fbbf24"/>
  <text x="700" y="270" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff" text-anchor="middle">Est. Cost</text>
  <text x="700" y="300" font-family="Open Sans, sans-serif" font-size="20" font-weight="700" fill="#fbbf24" text-anchor="middle">$22,100</text>
  <text x="700" y="320" font-family="Open Sans, sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle">What we forecast</text>
  
  <!-- Arrow -->
  <line x1="820" y1="290" x2="850" y2="290" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  
  <!-- 4. Actual -->
  <rect x="850" y="240" width="240" height="100" rx="8" fill="#27272a" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="890" cy="265" r="6" fill="#10b981"/>
  <text x="970" y="270" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff" text-anchor="middle">Actual Cost</text>
  <text x="970" y="300" font-family="Open Sans, sans-serif" font-size="20" font-weight="700" fill="#10b981" text-anchor="middle">$21,800</text>
  <text x="970" y="320" font-family="Open Sans, sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle">What it cost</text>
  
  <!-- Comparison metrics -->
  <text x="24" y="385" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Analysis</text>
  
  <!-- Variance 1 -->
  <rect x="40" y="400" width="360" height="75" rx="8" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="60" y="425" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">Pipeline vs. Quoted</text>
  <text x="60" y="450" font-family="Open Sans, sans-serif" font-size="18" font-weight="700" fill="#22d3ee">-$2,500</text>
  <text x="60" y="468" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Negotiated down (-5%)</text>
  
  <!-- Variance 2 -->
  <rect x="420" y="400" width="360" height="75" rx="8" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="440" y="425" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">Quoted vs. Estimated</text>
  <text x="440" y="450" font-family="Open Sans, sans-serif" font-size="18" font-weight="700" fill="#a78bfa">+$25,400</text>
  <text x="440" y="468" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Margin protected (53.5%)</text>
  
  <!-- Variance 3 -->
  <rect x="800" y="400" width="360" height="75" rx="8" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="820" y="425" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">Estimated vs. Actual</text>
  <text x="820" y="450" font-family="Open Sans, sans-serif" font-size="18" font-weight="700" fill="#10b981">-$300</text>
  <text x="820" y="468" font-family="Open Sans, sans-serif" font-size="10" fill="#10b981">Delivered under estimate (1.4%)</text>
  
  <!-- Financial lifecycle states -->
  <text x="24" y="520" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Financial Lifecycle States</text>
  
  <rect x="40" y="535" width="240" height="45" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="160" y="568" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff" text-anchor="middle">Quoted</text>
  
  <line x1="280" y1="558" x2="310" y2="558" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  
  <rect x="310" y="535" width="240" height="45" rx="8" fill="#27272a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="430" y="568" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">In Progress</text>
  
  <line x1="550" y1="558" x2="580" y2="558" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  
  <rect x="580" y="535" width="240" height="45" rx="8" fill="#27272a" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="700" y="568" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#a78bfa" text-anchor="middle">Delivered</text>
  
  <line x1="820" y1="558" x2="850" y2="558" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  
  <rect x="850" y="535" width="240" height="45" rx="8" fill="#27272a" stroke="#10b981" stroke-width="1.5"/>
  <text x="970" y="568" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#10b981" text-anchor="middle">Completed</text>
  
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#10b981" />
    </marker>
  </defs>
</svg>
