  <text x="770" y="498" font-family="Open Sans, sans-serif" font-size="13" font-weight="600" fill="#f5f3ff">Next Payout: March 1</text>
  <text x="770" y="516" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">Amount: $4,806</text>
