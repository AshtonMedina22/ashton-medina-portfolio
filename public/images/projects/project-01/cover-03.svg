<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="darkBg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#darkBg3)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#09090b" opacity="0.8"/>
  <text x="24" y="38" font-family="Open Sans, sans-serif" font-size="16" font-weight="600" fill="#f5f3ff">Data Synchronization Engine</text>
  
  <!-- Main title -->
  <text x="24" y="95" font-family="Open Sans, sans-serif" font-size="14" font-weight="600" fill="#f5f3ff">65+ Fields Synced Bidirectionally</text>
  <text x="24" y="115" font-family="Open Sans, sans-serif" font-size="12" fill="#a1a1aa">Order confirmation automatically updates CRM, Projects, and Contacts</text>
  
  <!-- System sync diagram -->
  <!-- Center CRM box -->
  <rect x="480" y="180" width="240" height="120" rx="10" fill="#1a1625" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="600" cy="210" r="25" fill="#a78bfa"/>
  <text x="600" y="217" font-family="Open Sans, sans-serif" font-size="14" font-weight="700" fill="#09090b" text-anchor="middle">CRM</text>
  <text x="600" y="270" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff" text-anchor="middle">Sales Opportunity</text>
  <text x="600" y="285" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa" text-anchor="middle">+ Contact Records</text>
  
  <!-- Left: Sales Order -->
  <rect x="80" y="180" width="240" height="120" rx="10" fill="#1a1625" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="200" cy="210" r="25" fill="#22d3ee"/>
  <text x="200" y="220" font-family="Open Sans, sans-serif" font-size="13" font-weight="700" fill="#09090b" text-anchor="middle">📋</text>
  <text x="200" y="270" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff" text-anchor="middle">Sales Order</text>
  <text x="200" y="285" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa" text-anchor="middle">New Opportunity</text>
  
  <!-- Top: Project -->
  <rect x="480" y="60" width="240" height="100" rx="10" fill="#1a1625" stroke="#a78bfa" stroke-width="2"/>
  <circle cx="600" cy="90" r="22" fill="#a78bfa"/>
  <text x="600" y="100" font-family="Open Sans, sans-serif" font-size="12" font-weight="700" fill="#09090b" text-anchor="middle">📊</text>
  <text x="600" y="145" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff" text-anchor="middle">Project Tasks</text>
  
  <!-- Right: Contacts -->
  <rect x="880" y="180" width="240" height="120" rx="10" fill="#1a1625" stroke="#22d3ee" stroke-width="2"/>
  <circle cx="1000" cy="210" r="25" fill="#22d3ee"/>
  <text x="1000" y="220" font-family="Open Sans, sans-serif" font-size="13" font-weight="700" fill="#09090b" text-anchor="middle">👥</text>
  <text x="1000" y="270" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff" text-anchor="middle">Contacts Database</text>
  <text x="1000" y="285" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa" text-anchor="middle">+ Team Assignment</text>
  
  <!-- Arrows with labels -->
  <!-- Sales Order to CRM -->
  <defs>
    <marker id="arrowViolet" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#a78bfa" />
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22d3ee" />
    </marker>
  </defs>
  
  <line x1="320" y1="235" x2="480" y2="235" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  <text x="380" y="225" font-family="Open Sans, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Create</text>
  
  <!-- CRM to Project -->
  <line x1="600" y1="180" x2="600" y2="160" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  <text x="625" y="170" font-family="Open Sans, sans-serif" font-size="10" fill="#a78bfa">Generate</text>
  
  <!-- CRM to Contacts -->
  <line x1="720" y1="235" x2="880" y2="235" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  <text x="790" y="225" font-family="Open Sans, sans-serif" font-size="10" fill="#a78bfa" text-anchor="middle">Link</text>
  
  <!-- Sync metrics section -->
  <rect x="24" y="360" width="1152" height="200" rx="12" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  
  <!-- Metrics title -->
  <text x="40" y="385" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">Sync Status & Metrics</text>
  <rect x="40" y="395" width="1110" height="1" fill="#a78bfa" opacity="0.2"/>
  
  <!-- Synced fields -->
  <text x="40" y="425" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">Synced Fields: Client Details, Contacts, Service Lines, Timeline, Budget, Revenue</text>
  
  <!-- Status indicators -->
  <rect x="40" y="450" width="200" height="60" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="60" cy="475" r="6" fill="#a78bfa"/>
  <text x="80" y="480" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff">CRM Synced</text>
  <text x="80" y="495" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Real-time bidirectional</text>
  
  <rect x="270" y="450" width="200" height="60" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="290" cy="475" r="6" fill="#a78bfa"/>
  <text x="310" y="480" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff">Projects Synced</text>
  <text x="310" y="495" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Auto-generated tasks</text>
  
  <rect x="500" y="450" width="200" height="60" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="520" cy="475" r="6" fill="#22d3ee"/>
  <text x="540" y="480" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff">Contacts Updated</text>
  <text x="540" y="495" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Team assigned automatically</text>
  
  <rect x="730" y="450" width="240" height="60" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="752" cy="475" r="6" fill="#a78bfa"/>
  <text x="772" y="480" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff">Last Sync</text>
  <text x="772" y="495" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">2 minutes ago • All systems live</text>
</svg>
