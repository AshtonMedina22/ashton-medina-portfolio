<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1625;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151220;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#darkBg)"/>
  
  <!-- Top navigation bar -->
  <rect x="0" y="0" width="1200" height="60" fill="#09090b" opacity="0.8"/>
  <text x="24" y="38" font-family="Open Sans, sans-serif" font-size="16" font-weight="600" fill="#f5f3ff">Sales Order Confirmation</text>
  <circle cx="1160" cy="30" r="16" fill="#a78bfa" opacity="0.8"/>
  
  <!-- Breadcrumb/status -->
  <text x="24" y="92" font-family="Open Sans, sans-serif" font-size="12" fill="#a1a1aa">Step 1: Create Sales Order</text>
  <circle cx="50" cy="82" r="6" fill="#a78bfa"/>
  <line x1="60" y1="82" x2="95" y2="82" stroke="#a1a1aa" stroke-width="2"/>
  <circle cx="110" cy="82" r="6" fill="#52525b"/>
  <line x1="120" y1="82" x2="155" y2="82" stroke="#52525b" stroke-width="2"/>
  <circle cx="170" cy="82" r="6" fill="#52525b"/>
  
  <!-- Main form card -->
  <rect x="24" y="110" width="550" height="460" rx="12" fill="url(#cardGradient)" stroke="#2e1064" stroke-width="1"/>
  
  <!-- Form header -->
  <rect x="24" y="110" width="550" height="50" rx="12" fill="#1e1b2e" stroke="#2e1064" stroke-width="1"/>
  <text x="40" y="142" font-family="Open Sans, sans-serif" font-size="14" font-weight="600" fill="#f5f3ff">Client Information</text>
  
  <!-- Client name -->
  <text x="40" y="180" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">BUSINESS INFORMATION</text>
  <rect x="40" y="190" width="260" height="36" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="55" y="212" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">TechCorp International</text>
  
  <!-- Contact -->
  <text x="320" y="180" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">PRIMARY CONTACT</text>
  <rect x="320" y="190" width="244" height="36" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="335" y="212" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">Sarah Johnson</text>
  
  <!-- Service line -->
  <text x="40" y="245" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">SERVICE LINE</text>
  <rect x="40" y="255" width="260" height="36" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="55" y="277" font-family="Open Sans, sans-serif" font-size="12" fill="#a78bfa">Platform Implementation</text>
  
  <!-- Amount -->
  <text x="320" y="245" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">CONTRACT VALUE</text>
  <rect x="320" y="255" width="244" height="36" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="335" y="277" font-family="Open Sans, sans-serif" font-size="12" fill="#22d3ee">$47,500.00</text>
  
  <!-- Timeline -->
  <text x="40" y="310" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">START DATE</text>
  <rect x="40" y="320" width="260" height="36" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="55" y="342" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">Mar 15, 2024</text>
  
  <text x="320" y="310" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">END DATE</text>
  <rect x="320" y="320" width="244" height="36" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="335" y="342" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">May 15, 2024</text>
  
  <!-- Divider -->
  <line x1="40" y1="370" x2="564" y2="370" stroke="#2e1064" stroke-width="1"/>
  
  <!-- Action buttons -->
  <rect x="40" y="390" width="260" height="44" rx="8" fill="#a78bfa" opacity="0.9"/>
  <text x="170" y="418" font-family="Open Sans, sans-serif" font-size="13" font-weight="600" fill="#09090b" text-anchor="middle">Auto-Generate Project</text>
  
  <rect x="324" y="390" width="240" height="44" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="444" y="418" font-family="Open Sans, sans-serif" font-size="13" font-weight="600" fill="#fafafa" text-anchor="middle">Save as Draft</text>
  
  <!-- Right side: Preview -->
  <rect x="608" y="110" width="568" height="460" rx="12" fill="url(#cardGradient)" stroke="#2e1064" stroke-width="1"/>
  
  <!-- Preview header -->
  <text x="630" y="145" font-family="Open Sans, sans-serif" font-size="14" font-weight="600" fill="#f5f3ff">Automation Preview</text>
  <rect x="630" y="160" width="510" height="2" fill="#a78bfa" opacity="0.3"/>
  
  <!-- What happens -->
  <text x="630" y="195" font-family="Open Sans, sans-serif" font-size="12" fill="#a1a1aa">On Confirmation, the System Will:</text>
  
  <!-- Steps -->
  <rect x="630" y="215" width="510" height="50" rx="8" fill="#27272a" opacity="0.5" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="650" cy="245" r="5" fill="#22d3ee"/>
  <text x="670" y="250" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">Create project from order</text>
  
  <rect x="630" y="280" width="510" height="50" rx="8" fill="#27272a" opacity="0.5" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="650" cy="310" r="5" fill="#22d3ee"/>
  <text x="670" y="315" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">Generate 27 tasks across 5 modules</text>
  
  <rect x="630" y="345" width="510" height="50" rx="8" fill="#27272a" opacity="0.5" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="650" cy="375" r="5" fill="#22d3ee"/>
  <text x="670" y="380" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">Sync 65+ fields to CRM and projects</text>
  
  <rect x="630" y="410" width="510" height="50" rx="8" fill="#27272a" opacity="0.5" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="650" cy="440" r="5" fill="#22d3ee"/>
  <text x="670" y="445" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">Assign team members to tasks</text>
</svg>
