<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="darkBg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#darkBg4)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#09090b" opacity="0.8"/>
  <text x="24" y="38" font-family="Open Sans, sans-serif" font-size="16" font-weight="600" fill="#f5f3ff">Pipeline Analytics</text>
  
  <!-- Dashboard title -->
  <text x="24" y="95" font-family="Open Sans, sans-serif" font-size="14" font-weight="600" fill="#f5f3ff">Automated Handoff Tracking</text>
  
  <!-- Top stats row -->
  <rect x="24" y="120" width="270" height="100" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="40" y="145" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">TOTAL ORDERS</text>
  <text x="40" y="175" font-family="Open Sans, sans-serif" font-size="28" font-weight="700" fill="#a78bfa">24</text>
  <text x="40" y="198" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Q1 2024</text>
  
  <rect x="316" y="120" width="270" height="100" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="332" y="145" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">AVG DAYS TO PROJECT</text>
  <text x="332" y="175" font-family="Open Sans, sans-serif" font-size="28" font-weight="700" fill="#22d3ee">&lt;1</text>
  <text x="332" y="198" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Automated process</text>
  
  <rect x="608" y="120" width="270" height="100" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="624" y="145" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">MANUAL RE-ENTRY ERRORS</text>
  <text x="624" y="175" font-family="Open Sans, sans-serif" font-size="28" font-weight="700" fill="#10b981">0</text>
  <text x="624" y="198" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Eliminated completely</text>
  
  <rect x="900" y="120" width="276" height="100" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="916" y="145" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">SYNC UPTIME</text>
  <text x="916" y="175" font-family="Open Sans, sans-serif" font-size="28" font-weight="700" fill="#10b981">99.9%</text>
  <text x="916" y="198" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">All systems operational</text>
  
  <!-- Timeline visualization -->
  <text x="24" y="255" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">Order-to-Delivery Timeline</text>
  <rect x="24" y="270" width="1152" height="250" rx="12" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  
  <!-- Timeline steps -->
  <!-- Step 1: Quote -->
  <rect x="50" y="300" width="200" height="70" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="80" cy="325" r="6" fill="#a78bfa"/>
  <text x="105" y="330" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Quote Created</text>
  <text x="105" y="350" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Day 0 • CRM event</text>
  
  <!-- Arrow -->
  <line x1="250" y1="335" x2="290" y2="335" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  
  <!-- Step 2: Won -->
  <rect x="290" y="300" width="200" height="70" rx="8" fill="#27272a" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="320" cy="325" r="6" fill="#a78bfa"/>
  <text x="345" y="330" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Deal Won</text>
  <text x="345" y="350" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Day 5 • Sales confirmed</text>
  
  <!-- Arrow -->
  <line x1="490" y1="335" x2="530" y2="335" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  
  <!-- Step 3: Order -->
  <rect x="530" y="300" width="200" height="70" rx="8" fill="#27272a" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="560" cy="325" r="6" fill="#a78bfa"/>
  <text x="585" y="330" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Auto-Created Project</text>
  <text x="585" y="350" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Day 5 • Instant automation</text>
  
  <!-- Arrow -->
  <line x1="730" y1="335" x2="770" y2="335" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  
  <!-- Step 4: Start -->
  <rect x="770" y="300" width="200" height="70" rx="8" fill="#27272a" stroke="#a78bfa" stroke-width="1"/>
  <circle cx="800" cy="325" r="6" fill="#a78bfa"/>
  <text x="825" y="330" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Team Onboarded</text>
  <text x="825" y="350" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Day 7 • Auto-assigned</text>
  
  <!-- Arrow -->
  <line x1="970" y1="335" x2="1010" y2="335" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowViolet)"/>
  
  <!-- Step 5: Delivery -->
  <rect x="1010" y="300" width="166" height="70" rx="8" fill="#27272a" stroke="#22d3ee" stroke-width="1"/>
  <circle cx="1031" cy="325" r="6" fill="#22d3ee"/>
  <text x="1056" y="330" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Execution</text>
  <text x="1056" y="350" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Day 45 • In progress</text>
  
  <!-- Benefits section -->
  <text x="24" y="420" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">Business Impact</text>
  
  <rect x="50" y="435" width="310" height="65" rx="8" fill="#27272a" opacity="0.8" stroke="#3f3f46" stroke-width="1"/>
  <text x="70" y="455" font-family="Open Sans, sans-serif" font-size="12" fill="#f5f3ff">Instant Delivery Readiness</text>
  <text x="70" y="475" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Projects ready on day of confirmation</text>
  <text x="70" y="490" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">No rework required</text>
  
  <rect x="390" y="435" width="310" height="65" rx="8" fill="#27272a" opacity="0.8" stroke="#3f3f46" stroke-width="1"/>
  <text x="410" y="455" font-family="Open Sans, sans-serif" font-size="12" fill="#f5f3ff">Data Integrity</text>
  <text x="410" y="475" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">65+ fields synced from source</text>
  <text x="410" y="490" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">No manual transcription needed</text>
  
  <rect x="730" y="435" width="310" height="65" rx="8" fill="#27272a" opacity="0.8" stroke="#3f3f46" stroke-width="1"/>
  <text x="750" y="455" font-family="Open Sans, sans-serif" font-size="12" fill="#f5f3ff">Team Alignment</text>
  <text x="750" y="475" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Everyone has correct info immediately</text>
  <text x="750" y="490" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Eliminates coordination delays</text>
</svg>
