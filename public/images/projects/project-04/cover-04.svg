<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="darkBg16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#darkBg16)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#09090b" opacity="0.8"/>
  <text x="24" y="38" font-family="Open Sans, sans-serif" font-size="16" font-weight="600" fill="#f5f3ff">Export & Scheduled Reporting</text>
  
  <!-- Title -->
  <text x="24" y="95" font-family="Open Sans, sans-serif" font-size="14" font-weight="600" fill="#f5f3ff">Multi-Format Export • Scheduled Delivery</text>
  
  <!-- Export options -->
  <text x="24" y="135" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">One-Click Export</text>
  
  <!-- Export buttons -->
  <rect x="24" y="155" width="260" height="130" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <rect x="40" y="170" width="230" height="44" rx="8" fill="#a78bfa"/>
  <text x="155" y="198" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#09090b" text-anchor="middle">📄 Export to PDF</text>
  
  <rect x="40" y="225" width="230" height="44" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="155" y="253" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#fafafa" text-anchor="middle">📊 Export to Excel</text>
  
  <!-- Export 2 -->
  <rect x="316" y="155" width="260" height="130" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <rect x="332" y="170" width="230" height="44" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="447" y="198" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#fafafa" text-anchor="middle">🖼️ Export as PNG</text>
  
  <rect x="332" y="225" width="230" height="44" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="447" y="253" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#fafafa" text-anchor="middle">💾 Download JSON</text>
  
  <!-- Export 3 -->
  <rect x="608" y="155" width="540" height="130" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <text x="624" y="180" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Recent Exports</text>
  
  <rect x="624" y="195" width="500" height="35" rx="6" fill="#27272a"/>
  <text x="640" y="215" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff">Operations_Dashboard_Feb2024.pdf</text>
  <text x="1108" y="215" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa" text-anchor="end">2 days ago</text>
  
  <rect x="624" y="240" width="500" height="35" rx="6" fill="#27272a"/>
  <text x="640" y="260" font-family="Open Sans, sans-serif" font-size="11" fill="#f5f3ff">Revenue_Analysis_Jan2024.xlsx</text>
  <text x="1108" y="260" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa" text-anchor="end">1 week ago</text>
  
  <!-- Scheduled reports -->
  <text x="24" y="330" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">Scheduled Reports</text>
  
  <!-- Report 1 -->
  <rect x="24" y="350" width="1152" height="100" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <rect x="40" y="370" width="500" height="60" rx="6" fill="#27272a" border="#3f3f46" border-width="1"/>
  <text x="56" y="390" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">Weekly Operations Summary</text>
  <text x="56" y="408" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Format: PDF • Recipients: Leadership Team (8 people)</text>
  <text x="56" y="425" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Schedule: Every Monday at 9:00 AM</text>
  
  <rect x="580" y="370" width="120" height="30" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="640" y="390" font-family="Open Sans, sans-serif" font-size="10" font-weight="600" fill="#a1a1aa" text-anchor="middle">Edit</text>
  
  <rect x="720" y="370" width="120" height="30" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="780" y="390" font-family="Open Sans, sans-serif" font-size="10" font-weight="600" fill="#a1a1aa" text-anchor="middle">View History</text>
  
  <rect x="1000" y="370" width="160" height="30" rx="6" fill="#dc262630" border="#dc2626" border-width="1"/>
  <text x="1080" y="390" font-family="Open Sans, sans-serif" font-size="10" font-weight="600" fill="#dc2626" text-anchor="middle">Pause</text>
  
  <!-- Report 2 -->
  <rect x="24" y="470" width="1152" height="100" rx="10" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  <rect x="40" y="490" width="500" height="60" rx="6" fill="#27272a" border="#3f3f46" border-width="1"/>
  <text x="56" y="510" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">Monthly Financial Review</text>
  <text x="56" y="528" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Format: Excel + PDF • Recipients: Finance Team (5 people)</text>
  <text x="56" y="545" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Schedule: 1st of every month at 8:30 AM</text>
  
  <rect x="580" y="490" width="120" height="30" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="640" y="510" font-family="Open Sans, sans-serif" font-size="10" font-weight="600" fill="#a1a1aa" text-anchor="middle">Edit</text>
  
  <rect x="720" y="490" width="120" height="30" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="780" y="510" font-family="Open Sans, sans-serif" font-size="10" font-weight="600" fill="#a1a1aa" text-anchor="middle">View History</text>
  
  <rect x="1000" y="490" width="160" height="30" rx="6" fill="#10b98130" border="#10b981" border-width="1"/>
  <text x="1080" y="510" font-family="Open Sans, sans-serif" font-size="10" font-weight="600" fill="#10b981" text-anchor="middle">Resume</text>
</svg>
