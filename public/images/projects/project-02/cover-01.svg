<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="darkBg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#darkBg5)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#09090b" opacity="0.8"/>
  <text x="24" y="38" font-family="Open Sans, sans-serif" font-size="16" font-weight="600" fill="#f5f3ff">Vendor Application Portal</text>
  
  <!-- Form container -->
  <rect x="80" y="90" width="1040" height="490" rx="12" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  
  <!-- Form header -->
  <rect x="100" y="110" width="1000" height="60" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="120" y="145" font-family="Open Sans, sans-serif" font-size="16" font-weight="600" fill="#f5f3ff">Complete Your Vendor Profile</text>
  <text x="120" y="160" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">Join our network in minutes. No account setup required.</text>
  
  <!-- Left column -->
  <!-- Business info -->
  <text x="120" y="205" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">BUSINESS INFORMATION</text>
  <rect x="120" y="215" width="450" height="40" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="135" y="242" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">Company Name</text>
  
  <rect x="120" y="270" width="450" height="40" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="135" y="297" font-family="Open Sans, sans-serif" font-size="12" fill="#a1a1aa">Enter company name...</text>
  
  <!-- Contact info -->
  <text x="120" y="335" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">PRIMARY CONTACT</text>
  <rect x="120" y="345" width="450" height="40" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="135" y="372" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">Alex Chen</text>
  
  <rect x="120" y="400" width="450" height="40" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="135" y="427" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">alex@company.com</text>
  
  <!-- Right column -->
  <!-- Service categories -->
  <text x="610" y="205" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">SERVICE CATEGORIES</text>
  
  <rect x="610" y="215" width="220" height="40" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <rect x="620" y="225" width="16" height="16" rx="3" fill="#a78bfa"/>
  <text x="645" y="238" font-family="Open Sans, sans-serif" font-size="12" fill="#fafafa">Implementation</text>
  
  <rect x="610" y="270" width="220" height="40" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <rect x="620" y="280" width="16" height="16" rx="3" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="645" y="293" font-family="Open Sans, sans-serif" font-size="12" fill="#a1a1aa">Integration Services</text>
  
  <rect x="610" y="325" width="220" height="40" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <rect x="620" y="335" width="16" height="16" rx="3" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="645" y="348" font-family="Open Sans, sans-serif" font-size="12" fill="#a1a1aa">Data Migration</text>
  
  <!-- Service verification -->
  <text x="850" y="205" font-family="Open Sans, sans-serif" font-size="11" fill="#a1a1aa">DOCUMENTS</text>
  
  <rect x="850" y="215" width="200" height="150" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="950" y="275" font-family="Open Sans, sans-serif" font-size="11" fill="#a78bfa" text-anchor="middle">📄 Drag files here</text>
  <text x="950" y="295" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa" text-anchor="middle">or click to select</text>
  <text x="950" y="315" font-family="Open Sans, sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle">Insurance, Licenses</text>
  
  <!-- Bottom buttons -->
  <rect x="120" y="475" width="460" height="48" rx="8" fill="#a78bfa"/>
  <text x="350" y="506" font-family="Open Sans, sans-serif" font-size="13" font-weight="600" fill="#09090b" text-anchor="middle">Submit Application</text>
  
  <rect x="610" y="475" width="440" height="48" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="830" y="506" font-family="Open Sans, sans-serif" font-size="13" font-weight="600" fill="#fafafa" text-anchor="middle">Save as Draft</text>
</svg>
