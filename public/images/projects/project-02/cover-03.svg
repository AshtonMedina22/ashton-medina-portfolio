<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="darkBg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#darkBg7)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#09090b" opacity="0.8"/>
  <text x="24" y="38" font-family="Open Sans, sans-serif" font-size="16" font-weight="600" fill="#f5f3ff">Work Order Lifecycle</text>
  
  <!-- Title -->
  <text x="24" y="95" font-family="Open Sans, sans-serif" font-size="14" font-weight="600" fill="#f5f3ff">6-State Workflow: Pending → Complete</text>
  
  <!-- Timeline -->
  <rect x="24" y="130" width="1152" height="180" rx="12" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  
  <!-- State 1: Pending -->
  <rect x="45" y="160" width="140" height="80" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="115" cy="180" r="8" fill="#52525b"/>
  <text x="115" y="230" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#a1a1aa" text-anchor="middle">Pending</text>
  <text x="115" y="245" font-family="Open Sans, sans-serif" font-size="9" fill="#52525b" text-anchor="middle">Awaiting vendor</text>
  
  <!-- Arrow -->
  <line x1="185" y1="200" x2="215" y2="200" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="215,200 205,195 205,205" fill="#a78bfa"/>
  
  <!-- State 2: Sent -->
  <rect x="215" y="160" width="140" height="80" rx="8" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="285" cy="180" r="8" fill="#22d3ee"/>
  <text x="285" y="230" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff" text-anchor="middle">Sent</text>
  <text x="285" y="245" font-family="Open Sans, sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle">Email delivered</text>
  
  <!-- Arrow -->
  <line x1="355" y1="200" x2="385" y2="200" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="385,200 375,195 375,205" fill="#a78bfa"/>
  
  <!-- State 3: Confirmed -->
  <rect x="385" y="160" width="140" height="80" rx="8" fill="#27272a" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="455" cy="180" r="8" fill="#a78bfa"/>
  <text x="455" y="230" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff" text-anchor="middle">Confirmed</text>
  <text x="455" y="245" font-family="Open Sans, sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle">e-signed</text>
  
  <!-- Arrow -->
  <line x1="525" y1="200" x2="555" y2="200" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="555,200 545,195 545,205" fill="#a78bfa"/>
  
  <!-- State 4: In Progress -->
  <rect x="555" y="160" width="140" height="80" rx="8" fill="#27272a" stroke="#a78bfa" stroke-width="1.5"/>
  <circle cx="625" cy="180" r="8" fill="#a78bfa"/>
  <text x="625" y="230" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff" text-anchor="middle">In Progress</text>
  <text x="625" y="245" font-family="Open Sans, sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle">Work started</text>
  
  <!-- Arrow -->
  <line x1="695" y1="200" x2="725" y2="200" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="725,200 715,195 715,205" fill="#a78bfa"/>
  
  <!-- State 5: Completed -->
  <rect x="725" y="160" width="140" height="80" rx="8" fill="#27272a" stroke="#10b981" stroke-width="1.5"/>
  <circle cx="795" cy="180" r="8" fill="#10b981"/>
  <text x="795" y="230" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff" text-anchor="middle">Completed</text>
  <text x="795" y="245" font-family="Open Sans, sans-serif" font-size="9" fill="#a1a1aa" text-anchor="middle">Delivered</text>
  
  <!-- RFQ Section -->
  <text x="24" y="350" font-family="Open Sans, sans-serif" font-size="12" font-weight="600" fill="#f5f3ff">Request for Quote (RFQ)</text>
  
  <!-- RFQ Container -->
  <rect x="24" y="365" width="1152" height="200" rx="12" fill="#1a1625" stroke="#2e1064" stroke-width="1"/>
  
  <!-- RFQ Card 1 -->
  <rect x="40" y="380" width="340" height="160" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="56" y="405" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">TechCorp Annual Gala</text>
  <text x="56" y="423" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Scope: Complete event planning</text>
  <text x="56" y="440" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Budget: $15,000</text>
  <text x="56" y="457" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Deadline: 4 days</text>
  
  <rect x="56" y="475" width="130" height="36" rx="6" fill="#a78bfa"/>
  <text x="121" y="497" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#09090b" text-anchor="middle">Submit Quote</text>
  
  <!-- RFQ Card 2 -->
  <rect x="410" y="380" width="340" height="160" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="426" y="405" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Acme Corp Website Redesign</text>
  <text x="426" y="423" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Scope: Full website redesign</text>
  <text x="426" y="440" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Budget: $22,000</text>
  <text x="426" y="457" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Deadline: 6 days</text>
  
  <rect x="426" y="475" width="130" height="36" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="491" y="497" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#fafafa" text-anchor="middle">You Quoted</text>
  
  <!-- RFQ Card 3 -->
  <rect x="780" y="380" width="340" height="160" rx="10" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="796" y="405" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#f5f3ff">Global Inc. Migration Project</text>
  <text x="796" y="423" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Scope: Data migration services</text>
  <text x="796" y="440" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Budget: $18,500</text>
  <text x="796" y="457" font-family="Open Sans, sans-serif" font-size="10" fill="#a1a1aa">Deadline: 2 days</text>
  
  <rect x="796" y="475" width="130" height="36" rx="6" fill="#27272a" stroke="#3f3f46" stroke-width="1"/>
  <text x="861" y="497" font-family="Open Sans, sans-serif" font-size="11" font-weight="600" fill="#a1a1aa" text-anchor="middle">Closed</text>
</svg>
